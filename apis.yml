        url: https://www.exim.gov/open-government-data
      - type: APIReference
        url: https://dev.socrata.com/foundry/data.exim.gov/8mmf-is58
    description: >-
      EXIM Bank publishes open government datasets through the federal Data.gov
      catalog. Datasets include export authorization records from 2006 onward,
      accessible programmatically via the Socrata Open Data API (SODA). The Chief
      Data Officer can be contacted at CDO@exim.gov for dataset requests.
