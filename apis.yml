description: >-
  The U.S. Export-Import Bank (EXIM) is the official export credit agency of
  the United States federal government. It assists in financing and facilitating
  U.S. exports of goods and services by providing export credit insurance,
  working capital guarantees, and direct loans to help American businesses
  compete in the global marketplace.
